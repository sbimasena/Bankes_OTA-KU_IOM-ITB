events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # HTTP — redirect to HTTPS, allow certbot challenge
    server {
        listen 80;
        server_name bankes.iom-itb.id;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name bankes.iom-itb.id;

        ssl_certificate     /etc/letsencrypt/live/bankes.iom-itb.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bankes.iom-itb.id/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        # ── MinIO static files (images served over HTTPS)
        location /minio-static/ {
            proxy_pass         http://minio:9000/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            add_header         Cache-Control     "public, max-age=31536000, immutable";
        }

        # ── OTA-KU Backend API (/ota-api/ → backend:3000/)
        # Must be before /ota/ block (more specific prefix wins)
        location /ota-api/ {
            proxy_pass         http://ota-backend:3000/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
        }

        # ── OTA-KU Frontend — redirect /ota → /ota/ (trailing slash needed for strip)
        location = /ota {
            return 301 https://$host/ota/;
        }

        # ── OTA-KU Frontend (/ota/ → ota-frontend:3000/, strips /ota prefix)
        location /ota/ {
            proxy_pass         http://ota-frontend:3000/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        'upgrade';
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Bankes IOM-ITB (root / → bankes:3031)
        location / {
            proxy_pass         http://bankes:3031;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        'upgrade';
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300;
        }
    }
}
